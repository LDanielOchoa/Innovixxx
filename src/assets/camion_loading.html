<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cargando Camión Minimalista</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #F8FAFC; 
            font-family: "Plus Jakarta Sans", system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle, #FFFFFF 0%, #F8FAFC 100%);
        }
        .contenedor-cargador {
            width: 380px;
            filter: drop-shadow(0px 12px 30px rgba(37, 99, 235, 0.22));
        }
    </style>
</head>
<body>

    <div class="contenedor-cargador">
        <svg viewBox="0 0 160 100" width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
            
            <defs>
                <!-- Degradado para la línea de vuelo (suelo infinito) -->
                <linearGradient id="lineSuelo" x1="0%" y1="0%" x2="100%" y2="0%">
                    <stop offset="0%" stop-color="#2563EB" stop-opacity="0" />
                    <stop offset="25%" stop-color="#2563EB" stop-opacity="1" />
                    <stop offset="75%" stop-color="#2563EB" stop-opacity="1" />
                    <stop offset="100%" stop-color="#2563EB" stop-opacity="0" />
                </linearGradient>
            </defs>

            <!-- VIENTO SUPER FLUIDO (Líneas aerodinámicas delgadas en el fondo) -->
            <g opacity="0.3">
                <rect y="44" width="30" height="1.5" rx="0.75" fill="#2563EB">
                    <animate attributeName="x" values="180; -40" dur="0.9s" repeatCount="indefinite" />
                </rect>
                <rect y="58" width="12" height="1.5" rx="0.75" fill="#2563EB">
                    <animate attributeName="x" values="170; -30" dur="0.6s" repeatCount="indefinite" />
                </rect>
                <rect y="70" width="45" height="1.5" rx="0.75" fill="#2563EB">
                    <animate attributeName="x" values="220; -60" dur="0.7s" repeatCount="indefinite" />
                </rect>
            </g>

            <!-- LÍNEA DE SUELO / CARRETERA -->
            <!-- En vez de color sólido usé una línea definida que desaparece hacia los costados -->
            <rect x="20" y="75" width="120" height="1.5" fill="url(#lineSuelo)" rx="0.5" />
            
            <!-- PEQUEÑAS MARCAS EN EL SUELO SIMULANDO VELOCIDAD (Rayas horizontales que pasan volando abajo) -->
            <rect y="74.5" width="6" height="1.5" rx="0.75" fill="#2563EB" opacity="0.8">
                <animate attributeName="x" values="120; 30" dur="0.45s" repeatCount="indefinite" />
            </rect>

            <!-- SOMBRA DEL CAMIÓN REFLEJADA EN EL SUELO -->
            <ellipse cx="80" cy="74.5" rx="35" ry="1.5" fill="#2563EB" opacity="0.1" />

            <!-- TEXTO DE CARGANDO (Diseño armónico y consistente con el camión) -->
            <text id="loading-text" x="80" y="93" font-family="'Plus Jakarta Sans', system-ui, -apple-system, sans-serif" font-size="9.5" font-weight="800" fill="#2563EB" text-anchor="middle" letter-spacing="2.5" opacity="0.9">
                CARGANDO<tspan><animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" />.</tspan><tspan><animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="0.5s"/>.</tspan><tspan><animate attributeName="opacity" values="0;1;0" dur="1.5s" repeatCount="indefinite" begin="1s"/>.</tspan>
            </text>

            <!-- GRUPO PRINCIPAL DEL CAMIÓN -->
            <!-- Trasladé todo al centro con translate -->
            <g transform="translate(42, 26.5)">
                
                <!-- ANIMACIÓN DE SUSPENSIÓN (Rebote solo para el chasis, ruedas quietas) -->
                <!-- Usando matemáticas clave (Splines) para dar una subida suave y una caída contundente (física gravitacional) -->
                <g>
                    <animateTransform 
                        attributeName="transform" 
                        type="translate" 
                        values="0,0.5; 0,-1.5; 0,0.5" 
                        dur="0.45s" 
                        repeatCount="indefinite" 
                        keyTimes="0; 0.5; 1" 
                        keySplines="0.4 0 0.6 1; 0.4 0 0.6 1" 
                        calcMode="spline" 
                    />
                    
                    <!-- 1. CAJA TRASERA (Furgón) rediseñada para ser mucho más redondeada y amigable -->
                    <path d="M 0 40 L 0 12 A 6 6 0 0 1 6 6 L 42 6 A 4 4 0 0 1 46 10 L 46 43 L 24 43 A 8 8 0 0 0 8 43 L 4 43 A 4 4 0 0 1 0 39 Z" fill="#2563EB" />
                    
                    <!-- Detalles laterales suavizados -->
                    <rect x="7" y="24" width="20" height="2" fill="#F8FAFC" rx="1" />
                    <rect x="7" y="30" width="14" height="2" fill="#F8FAFC" rx="1" />

                    <!-- Conexión redonda -->
                    <rect x="44" y="14" width="6" height="2" fill="#3B82F6" opacity="0.6" rx="1" />

                    <!-- 2. CABINA FRONTAL con look súper redondeado estilo moderno -->
                    <path d="M 48 20 A 4 4 0 0 1 52 16 L 58 16 A 5 5 0 0 1 62.5 18 L 71.5 28 A 5 5 0 0 1 73.5 31.5 L 73.5 40 A 3 3 0 0 1 70.5 43 L 68 43 A 8 8 0 0 0 52 43 L 48 43 Z" fill="#2563EB" />
                    
                    <!-- 3. VENTANA frontal blanca mucho más curvilínea -->
                    <path d="M 53.5 19.5 L 57.5 19.5 A 2 2 0 0 1 59 20 L 65.5 27 A 3 3 0 0 1 64.5 29 L 53.5 29 A 2.5 2.5 0 0 1 51 26.5 L 51 22 A 2.5 2.5 0 0 1 53.5 19.5 Z" fill="#F8FAFC" />
                </g>

                <!-- RUEDAS PERFECTAMENTE ALINEADAS (En X coinciden con el hueco del guardabarros) -->
                <!-- Guardabarros trasero era un arco de 24 a 8, radio 8. El centro exacto es de 16 -->
                <!-- Rueda estática abajo, NO recibe el bounce del chasis! -->
                <g transform="translate(16, 43)">
                    <!-- Aro azul del caucho (Llanta principal) con interior blanco para destacar -->
                    <circle r="4.5" fill="#F8FAFC" stroke="#2563EB" stroke-width="2.5" />
                    
                    <!-- CONJUNTO DE RINES - ANIMADO -->
                    <!-- Se ha recalibrado el origen a 0,0 para que gire sin ninguna vibración irregular (wobble) -->
                    <g>
                        <!-- Tres aspas idénticas (Matemáticamente calibradas a 120° C/U) -->
                        <line x1="0" y1="0" x2="0" y2="-4" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="0" y1="0" x2="-3.46" y2="2" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="0" y1="0" x2="3.46" y2="2" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round"/>
                        <!-- Giro moderado y continuo -->
                        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.4s" repeatCount="indefinite" />
                    </g>
                    <!-- Centro del eje (tapa de las aspas) estática, mejora realismo -->
                    <circle r="1" fill="#2563EB" />
                </g>

                <!-- Guardabarros delantero era arco de 68 a 52. Centro exacto es 60 -->
                <g transform="translate(60, 43)">
                    <circle r="4.5" fill="#F8FAFC" stroke="#2563EB" stroke-width="2.5" />
                    <g>
                        <line x1="0" y1="0" x2="0" y2="-4" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="0" y1="0" x2="-3.46" y2="2" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round"/>
                        <line x1="0" y1="0" x2="3.46" y2="2" stroke="#2563EB" stroke-width="1.2" stroke-linecap="round"/>
                        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="0.4s" repeatCount="indefinite" />
                    </g>
                    <circle r="1" fill="#2563EB" />
                </g>

            </g>
        </svg>
    </div>

    <script>
        const language = (navigator.language || 'es').toLowerCase()
        const loadingText = document.getElementById('loading-text')
        if (loadingText) {
            loadingText.firstChild.textContent = language.startsWith('en') ? 'LOADING' : 'CARGANDO'
        }
    </script>

</body>
</html>
